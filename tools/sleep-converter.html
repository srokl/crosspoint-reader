<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossPoint Sleep Screen Converter</title>
  <style>
    :root {
      --bg: #111;
      --surface: #1c1c1c;
      --border: #2e2e2e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #bbb;
      --snap: rgba(255, 180, 0, 0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      gap: 0;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.3px;
      margin-bottom: 5px;
    }

    .subtitle { font-size: 0.78rem; color: var(--muted); }

    /* ── Drop zone ─────────────────────────────── */
    .drop-zone {
      width: 100%;
      max-width: 560px;
      height: 120px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #666; background: #161616; }
    .drop-zone svg { width: 22px; height: 22px; stroke: var(--muted); flex-shrink: 0; }
    #fileInput { display: none; }

    /* ── Controls (pills + position picker) ─────── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .scale-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .scale-row label { font-size: 0.75rem; color: var(--muted); margin-right: 2px; }

    .pill {
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.12s;
    }
    .pill.active {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── Position picker ─────────────────────────── */
    .position-row {
      display: none;
      align-items: center;
      gap: 12px;
    }
    .position-row.visible { display: flex; }

    .pos-row-label {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 30px);
      grid-template-rows: repeat(3, 30px);
      gap: 3px;
    }

    .pos-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      background: none;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.1s, background 0.1s;
    }
    .pos-btn:hover { border-color: #555; background: #181818; }

    .pos-btn::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 1px;
      transition: background 0.1s;
    }

    .pos-btn[data-pos="tl"]::after { top: 4px;  left: 4px; }
    .pos-btn[data-pos="tc"]::after { top: 4px;  left: 50%; transform: translateX(-50%); }
    .pos-btn[data-pos="tr"]::after { top: 4px;  right: 4px; }
    .pos-btn[data-pos="ml"]::after { top: 50%;  left: 4px; transform: translateY(-50%); }
    .pos-btn[data-pos="mc"]::after { top: 50%;  left: 50%; transform: translate(-50%,-50%); }
    .pos-btn[data-pos="mr"]::after { top: 50%;  right: 4px; transform: translateY(-50%); }
    .pos-btn[data-pos="bl"]::after { bottom: 4px; left: 4px; }
    .pos-btn[data-pos="bc"]::after { bottom: 4px; left: 50%; transform: translateX(-50%); }
    .pos-btn[data-pos="br"]::after { bottom: 4px; right: 4px; }

    .pos-btn.active { border-color: var(--accent); background: rgba(232,232,232,0.08); }
    .pos-btn.active::after { background: var(--accent); }

    /* ── Editor row ────────────────────────────── */
    .editor-row {
      display: none;
      gap: 28px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .editor-row.visible { display: flex; }

    .panel-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .panel-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    /* ── Source frame ────────────────────────────── */
    .source-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 6px;
      flex-shrink: 0;
    }

    #sourceCanvas { display: block; }

    #cropBox {
      position: absolute;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.52);
      border: 1.5px solid rgba(255,255,255,0.85);
      outline: 1px solid rgba(0,0,0,0.4);
      cursor: move;
      user-select: none;
      touch-action: none;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    #cropBox.snapped {
      border-color: rgba(255,200,60,0.95);
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.52), inset 0 0 0 1px rgba(255,200,60,0.25);
    }
    #cropBox::before, #cropBox::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: rgba(255,255,255,0.9);
      border-style: solid;
    }
    #cropBox::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    #cropBox::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Snap guides */
    .snap-guide {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      background: var(--snap);
      transition: opacity 0.08s;
      z-index: 10;
    }
    .snap-guide.active { opacity: 1; }
    #snapGuideH { height: 1px; left: 0; right: 0; top: 50%; margin-top: -0.5px; }
    #snapGuideV { width: 1px; top: 0; bottom: 0; left: 50%; margin-left: -0.5px; }

    /* ── Preview canvas ────────────────────────── */
    #previewCanvas {
      border: 1px solid var(--border);
      border-radius: 6px;
      image-rendering: auto;
      display: block;
      width: 240px;
      height: 400px;
    }

    /* ── Download ──────────────────────────────── */
    .download-btn {
      display: none;
      padding: 10px 36px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.12s;
      margin-bottom: 20px;
    }
    .download-btn:hover { opacity: 0.82; }
    .download-btn.visible { display: block; }

    footer {
      font-size: 0.7rem;
      color: #3a3a3a;
      text-align: center;
      line-height: 1.9;
    }
    footer code {
      background: #1a1a1a;
      border: 1px solid #272727;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.68rem;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>CrossPoint Sleep Screen Converter</h1>
  <p class="subtitle">480×800 · 4-level grayscale · Floyd-Steinberg · factory LUT quality</p>
</header>

<div class="drop-zone" id="dropZone">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12M12 16.5V3"/>
  </svg>
  Drop image here or click to browse
  <input type="file" id="fileInput" accept="image/*">
</div>

<!-- Controls: mode pills + position picker (fit only) -->
<div class="controls">
  <div class="scale-row">
    <label>Scale:</label>
    <button class="pill" id="fitBtn" data-mode="fit">Fit</button>
    <button class="pill active" id="cropBtn" data-mode="crop">Crop</button>
  </div>

  <div class="position-row" id="positionRow">
    <span class="pos-row-label">Position on screen</span>
    <div class="pos-grid">
      <button class="pos-btn" data-pos="tl" title="Top left"></button>
      <button class="pos-btn" data-pos="tc" title="Top centre"></button>
      <button class="pos-btn" data-pos="tr" title="Top right"></button>
      <button class="pos-btn" data-pos="ml" title="Middle left"></button>
      <button class="pos-btn active" data-pos="mc" title="Centre"></button>
      <button class="pos-btn" data-pos="mr" title="Middle right"></button>
      <button class="pos-btn" data-pos="bl" title="Bottom left"></button>
      <button class="pos-btn" data-pos="bc" title="Bottom centre"></button>
      <button class="pos-btn" data-pos="br" title="Bottom right"></button>
    </div>
  </div>
</div>

<!-- Editor: source and preview always the same height -->
<div class="editor-row" id="editorRow">
  <div class="panel-col">
    <span class="panel-label" id="sourceLabel">Source — drag to reposition</span>
    <div class="source-frame" id="sourceFrame">
      <canvas id="sourceCanvas"></canvas>
      <div id="cropBox"></div>
      <div id="snapGuideH" class="snap-guide"></div>
      <div id="snapGuideV" class="snap-guide"></div>
    </div>
  </div>

  <div class="panel-col">
    <span class="panel-label">Preview</span>
    <!-- 480×800 internal, CSS halves to 240×400 — crisp 2× -->
    <canvas id="previewCanvas" width="480" height="800"></canvas>
  </div>
</div>

<button class="download-btn" id="downloadBtn">Download .pxc</button>

<footer>
  Place file in <code>/.sleep/</code> or as <code>/sleep.pxc</code> on SD card<br>
  480×800 px · 2 bits/pixel · ~96 KB per file
</footer>

<canvas id="workCanvas" width="480" height="800" style="display:none"></canvas>

<script>
const TARGET_W = 480;
const TARGET_H = 800;
const MAX_EDITOR_W = 300;
const MAX_EDITOR_H = 500;
const SNAP_THRESHOLD = 9;

const GRAY_REF  = [0, 85, 170, 255];
const GRAY_DISP = [0, 85, 170, 255];

let loadedImg    = null;
let pxcBytes     = null;
let outputName   = 'sleep.pxc';
let mode         = 'crop';
let fitAlign     = 'mc';

let displayScale = 1;
let workScale    = 1;
let dispImgW     = 0;
let dispImgH     = 0;
let boxW = 0, boxH = 0, boxX = 0, boxY = 0;

let isDragging   = false;
let dragStartX   = 0, dragStartY = 0, dragStartBX = 0, dragStartBY = 0;
let snapH = false, snapV = false;
let convertTimer = null;

const dropZone     = document.getElementById('dropZone');
const fileInput    = document.getElementById('fileInput');
const editorRow    = document.getElementById('editorRow');
const sourceFrame  = document.getElementById('sourceFrame');
const sourceCanvas = document.getElementById('sourceCanvas');
const sourceLabel  = document.getElementById('sourceLabel');
const cropBox      = document.getElementById('cropBox');
const snapGuideH   = document.getElementById('snapGuideH');
const snapGuideV   = document.getElementById('snapGuideV');
const positionRow  = document.getElementById('positionRow');
const previewCanvas= document.getElementById('previewCanvas');
const workCanvas   = document.getElementById('workCanvas');
const downloadBtn  = document.getElementById('downloadBtn');

// Mode pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (loadedImg) resetEditor();
  });
});

// Position picker
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    fitAlign = btn.dataset.pos;
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    scheduleConvert(0);
  });
});

// Drop / file pick
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  outputName = file.name.replace(/\.[^.]+$/, '') + '.pxc';
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { loadedImg = img; resetEditor(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetEditor() {
  const srcW = loadedImg.naturalWidth;
  const srcH = loadedImg.naturalHeight;

  displayScale = Math.min(MAX_EDITOR_W / srcW, MAX_EDITOR_H / srcH);
  dispImgW = Math.round(srcW * displayScale);
  dispImgH = Math.round(srcH * displayScale);

  workScale = mode === 'crop'
    ? Math.max(TARGET_W / srcW, TARGET_H / srcH)
    : Math.min(TARGET_W / srcW, TARGET_H / srcH);

  boxW = Math.min((TARGET_W / workScale) * displayScale, dispImgW);
  boxH = Math.min((TARGET_H / workScale) * displayScale, dispImgH);
  boxX = (dispImgW - boxW) / 2;
  boxY = (dispImgH - boxH) / 2;

  sourceCanvas.width  = dispImgW;
  sourceCanvas.height = dispImgH;
  sourceCanvas.getContext('2d').drawImage(loadedImg, 0, 0, dispImgW, dispImgH);
  sourceFrame.style.width  = dispImgW + 'px';
  sourceFrame.style.height = dispImgH + 'px';

  if (mode === 'crop') {
    sourceLabel.textContent = 'Source — drag to reposition';
    cropBox.style.display = 'block';
    positionRow.classList.remove('visible');
    clearSnap();
    applyCropBox();
  } else {
    sourceLabel.textContent = 'Source';
    cropBox.style.display = 'none';
    positionRow.classList.add('visible');
    clearSnap();
  }

  editorRow.classList.add('visible');
  scheduleConvert(0);
}

function applyCropBox() {
  boxX = Math.max(0, Math.min(dispImgW - boxW, boxX));
  boxY = Math.max(0, Math.min(dispImgH - boxH, boxY));
  cropBox.style.left   = boxX + 'px';
  cropBox.style.top    = boxY + 'px';
  cropBox.style.width  = boxW + 'px';
  cropBox.style.height = boxH + 'px';
}

function clearSnap() {
  snapH = snapV = false;
  snapGuideH.classList.remove('active');
  snapGuideV.classList.remove('active');
  cropBox.classList.remove('snapped');
}

// Drag
cropBox.addEventListener('mousedown',  onDragStart);
cropBox.addEventListener('touchstart', onDragStart, { passive: false });
window.addEventListener('mousemove',   onDragMove);
window.addEventListener('touchmove',   onDragMove, { passive: false });
window.addEventListener('mouseup',     onDragEnd);
window.addEventListener('touchend',    onDragEnd);

function clientXY(e) {
  return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                   : { x: e.clientX, y: e.clientY };
}

function onDragStart(e) {
  if (mode !== 'crop') return;
  e.preventDefault();
  isDragging = true;
  const p = clientXY(e);
  dragStartX = p.x; dragStartY = p.y;
  dragStartBX = boxX; dragStartBY = boxY;
}

function onDragMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const p = clientXY(e);
  let rawX = dragStartBX + (p.x - dragStartX);
  let rawY = dragStartBY + (p.y - dragStartY);

  const centreX = (dispImgW - boxW) / 2;
  const centreY = (dispImgH - boxH) / 2;
  snapH = Math.abs(rawX - centreX) < SNAP_THRESHOLD;
  snapV = Math.abs(rawY - centreY) < SNAP_THRESHOLD;
  boxX = snapH ? centreX : rawX;
  boxY = snapV ? centreY : rawY;

  applyCropBox();
  snapGuideV.classList.toggle('active', snapH);
  snapGuideH.classList.toggle('active', snapV);
  cropBox.classList.toggle('snapped', snapH || snapV);
  scheduleConvert(100);
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  setTimeout(clearSnap, 600);
  scheduleConvert(0);
}

// Conversion
function scheduleConvert(delay) {
  clearTimeout(convertTimer);
  convertTimer = setTimeout(convert, delay);
}

function lum(r, g, b) { return (77 * r + 150 * g + 29 * b) >> 8; }

function quantize(v) {
  if (v < 43)  return 0;
  if (v < 128) return 1;
  if (v < 213) return 2;
  return 3;
}

function fitOffset(fw, fh) {
  const pos = fitAlign;
  let x = pos[1] === 'l' ? 0 : pos[1] === 'c' ? (TARGET_W - fw) / 2 : TARGET_W - fw;
  let y = pos[0] === 't' ? 0 : pos[0] === 'm' ? (TARGET_H - fh) / 2 : TARGET_H - fh;
  return { x, y };
}

function convert() {
  if (!loadedImg) return;
  const srcW = loadedImg.naturalWidth;
  const srcH = loadedImg.naturalHeight;
  const ctx  = workCanvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, TARGET_W, TARGET_H);

  if (mode === 'fit') {
    const fitScale = Math.min(TARGET_W / srcW, TARGET_H / srcH);
    const fw = srcW * fitScale, fh = srcH * fitScale;
    const off = fitOffset(fw, fh);
    ctx.drawImage(loadedImg, off.x, off.y, fw, fh);
  } else {
    const k = workScale / displayScale;
    ctx.drawImage(loadedImg, -boxX * k, -boxY * k, srcW * workScale, srcH * workScale);
  }

  const px  = ctx.getImageData(0, 0, TARGET_W, TARGET_H).data;
  const buf = new Float32Array(TARGET_W * TARGET_H);
  for (let i = 0; i < TARGET_W * TARGET_H; i++)
    buf[i] = lum(px[i*4], px[i*4+1], px[i*4+2]);

  const q = new Uint8Array(TARGET_W * TARGET_H);
  for (let y = 0; y < TARGET_H; y++) {
    for (let x = 0; x < TARGET_W; x++) {
      const i  = y * TARGET_W + x;
      const v  = Math.max(0, Math.min(255, buf[i]));
      const qv = quantize(v);
      q[i]     = qv;
      const err = v - GRAY_REF[qv];
      if (x + 1 < TARGET_W) buf[i+1] += err * 7/16;
      if (y + 1 < TARGET_H) {
        if (x > 0) buf[i+TARGET_W-1] += err * 3/16;
        buf[i+TARGET_W]   += err * 5/16;
        if (x + 1 < TARGET_W) buf[i+TARGET_W+1] += err * 1/16;
      }
    }
  }

  const prevCtx = previewCanvas.getContext('2d');
  const id = prevCtx.createImageData(TARGET_W, TARGET_H);
  for (let i = 0; i < TARGET_W * TARGET_H; i++) {
    const g = GRAY_DISP[q[i]];
    id.data[i*4] = id.data[i*4+1] = id.data[i*4+2] = g;
    id.data[i*4+3] = 255;
  }
  prevCtx.putImageData(id, 0, 0);

  pxcBytes = encodePxc(q, TARGET_W, TARGET_H);
  downloadBtn.classList.add('visible');
}

function encodePxc(q, w, h) {
  const bpr = Math.ceil(w / 4);
  const buf = new Uint8Array(4 + bpr * h);
  buf[0] = w & 0xFF; buf[1] = (w >> 8) & 0xFF;
  buf[2] = h & 0xFF; buf[3] = (h >> 8) & 0xFF;
  for (let row = 0; row < h; row++)
    for (let col = 0; col < w; col++) {
      const pv = q[row * w + col] & 0x03;
      buf[4 + row * bpr + (col >> 2)] |= pv << (6 - (col & 3) * 2);
    }
  return buf;
}

downloadBtn.addEventListener('click', () => {
  if (!pxcBytes) return;
  const url = URL.createObjectURL(new Blob([pxcBytes], { type: 'application/octet-stream' }));
  const a = document.createElement('a');
  a.href = url; a.download = outputName; a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
