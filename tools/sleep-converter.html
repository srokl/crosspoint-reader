<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossPoint Sleep Screen Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0d0f;
      --panel:     #141416;
      --surface:   #1c1c20;
      --border:    #25252b;
      --border2:   #2e2e36;
      --accent:    #e8e8ea;
      --accent-dim:#c8c8cc;
      --text:      #e4e4e8;
      --muted:     #5a5a68;
      --muted2:    #3a3a46;
      --snap:      rgba(251,191,36,0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 56px;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      width: 100%;
      max-width: 860px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    /* ── App shell ────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 272px;
      grid-template-rows: auto 1fr;
      gap: 12px;
      align-items: start;
    }

    /* ── Left column ─────────────────────────────── */
    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* ── Drop zone ─────────────────────────────────── */
    .drop-zone {
      width: 100%;
      min-height: 140px;
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 24px;
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: rgba(59,130,246,0.04);
      color: var(--text);
    }
    .drop-zone svg { width: 24px; height: 24px; stroke: currentColor; opacity: 0.7; }
    .drop-zone small {
      font-size: 0.72rem;
      color: var(--muted2);
      margin-top: -4px;
    }
    #fileInput { display: none; }

    /* ── Source editor ────────────────────────────── */
    .editor-section { display: none; width: 100%; }
    .editor-section.visible { display: flex; flex-direction: column; align-items: center; }

    .source-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0;  /* handled by source-header gap */
    }

    .change-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
      line-height: 1.6;
    }
    .change-btn:hover { color: var(--text); border-color: var(--muted); }

    .source-frame {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: inline-block;
    }

    #sourceCanvas { display: block; }

    #cropBox {
      position: absolute;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.55);
      border: 1.5px solid rgba(255,255,255,0.8);
      outline: 1px solid rgba(0,0,0,0.5);
      cursor: move;
      user-select: none;
      touch-action: none;
      transition: border-color 0.1s;
    }
    #cropBox.snapped {
      border-color: rgba(251,191,36,0.95);
    }
    #cropBox::before, #cropBox::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: rgba(255,255,255,0.85);
      border-style: solid;
    }
    #cropBox::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    #cropBox::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .snap-guide {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      background: var(--snap);
      transition: opacity 0.08s;
      z-index: 10;
    }
    .snap-guide.active { opacity: 1; }
    #snapGuideH { height: 1px; left: 0; right: 0; top: 50%; margin-top: -.5px; }
    #snapGuideV { width: 1px; top: 0; bottom: 0; left: 50%; margin-left: -.5px; }

    /* ── Right panel ────────────────────────────────── */
    .right {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-section:last-child { border-bottom: none; }

    .panel-heading {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      margin-bottom: 10px;
      text-align: center;
    }

    .panel-section { display: flex; flex-direction: column; align-items: center; }

    /* ── Scale pills ────────────────────────────────── */
    .pill-group {
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .pill {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.12s;
      text-align: center;
    }
    .pill:hover { border-color: #444; color: var(--text); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
      font-weight: 600;
    }

    /* ── Position picker ────────────────────────────── */
    #posSection { display: none; }
    #posSection.visible { display: flex; }

    .pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 26px);
      grid-template-rows: repeat(3, 26px);
      gap: 3px;
      width: fit-content;
      margin: 0 auto;
    }

    .pos-btn {
      width: 26px;
      height: 26px;
      min-width: 0;
      padding: 0;
      border: 1px solid var(--border2);
      background: var(--surface);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.1s, background 0.1s;
    }
    .pos-btn:hover { border-color: #444; background: #1f1f25; }
    .pos-btn::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 1px;
      transition: background 0.1s;
    }

    .pos-btn[data-pos="tl"]::after { top: 5px;  left: 5px; }
    .pos-btn[data-pos="tc"]::after { top: 5px;  left: 50%; transform: translateX(-50%); }
    .pos-btn[data-pos="tr"]::after { top: 5px;  right: 5px; }
    .pos-btn[data-pos="ml"]::after { top: 50%;  left: 5px; transform: translateY(-50%); }
    .pos-btn[data-pos="mc"]::after { top: 50%;  left: 50%; transform: translate(-50%,-50%); }
    .pos-btn[data-pos="mr"]::after { top: 50%;  right: 5px; transform: translateY(-50%); }
    .pos-btn[data-pos="bl"]::after { bottom: 5px; left: 5px; }
    .pos-btn[data-pos="bc"]::after { bottom: 5px; left: 50%; transform: translateX(-50%); }
    .pos-btn[data-pos="br"]::after { bottom: 5px; right: 5px; }

    .pos-btn.active { border-color: var(--accent); background: rgba(232,232,234,0.1); }
    .pos-btn.active::after { background: var(--accent); }

    /* ── Preview ────────────────────────────────────── */
    #previewCanvas {
      display: block;
      width: calc(100% - 32px);
      /* height computed to maintain 480:800 = 3:5 ratio */
      aspect-ratio: 3 / 5;
      border-radius: 6px;
      border: 1px solid var(--border);
      image-rendering: auto;
    }

    /* ── Download button ────────────────────────────── */
    .download-btn {
      display: none;
      width: 100%;
      padding: 12px 0;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.12s;
      margin-top: 10px;
    }
    .download-btn:hover { opacity: 0.82; }
    .download-btn.visible { display: block; }

    /* ── Footer ─────────────────────────────────────── */
    footer {
      margin-top: 28px;
      font-size: 0.7rem;
      color: var(--muted2);
      text-align: center;
      line-height: 2;
    }
    footer code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--muted);
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; }
      .right { order: -1; }
      #previewCanvas { aspect-ratio: 3 / 5; max-height: 300px; width: auto; margin: 0 auto; display: block; }
    }
  </style>
</head>
<body>

<header>
  <h1>CrossPoint Sleep Screen Converter</h1>
</header>

<div class="app">

  <!-- ── Left: drop zone + editor ─────────────────── -->
  <div class="left">

    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12M12 16.5V3"/>
      </svg>
      Drop image here or click to browse
      <small>PNG, JPG, WebP, BMP, GIF</small>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="editor-section" id="editorSection">
      <div class="source-header">
        <p class="section-label" id="sourceLabel">Source — drag to reposition</p>
        <button class="change-btn" id="changeBtn">Change</button>
      </div>
      <div class="source-frame" id="sourceFrame">
        <canvas id="sourceCanvas"></canvas>
        <div id="cropBox"></div>
        <div id="snapGuideH" class="snap-guide"></div>
        <div id="snapGuideV" class="snap-guide"></div>
      </div>
      <button class="download-btn" id="downloadBtn">Download .pxc</button>
    </div>

  </div>

  <!-- ── Right: settings + preview ───────────────── -->
  <div class="right">

    <div class="panel-section">
      <p class="panel-heading">Scale</p>
      <div class="pill-group">
        <button class="pill" id="fitBtn" data-mode="fit">Fit</button>
        <button class="pill active" id="cropBtn" data-mode="crop">Crop</button>
      </div>
    </div>

    <div class="panel-section" id="posSection">
      <p class="panel-heading">Position on screen</p>
      <div class="pos-grid">
        <button class="pos-btn" data-pos="tl" title="Top left"></button>
        <button class="pos-btn" data-pos="tc" title="Top centre"></button>
        <button class="pos-btn" data-pos="tr" title="Top right"></button>
        <button class="pos-btn" data-pos="ml" title="Middle left"></button>
        <button class="pos-btn active" data-pos="mc" title="Centre"></button>
        <button class="pos-btn" data-pos="mr" title="Middle right"></button>
        <button class="pos-btn" data-pos="bl" title="Bottom left"></button>
        <button class="pos-btn" data-pos="bc" title="Bottom centre"></button>
        <button class="pos-btn" data-pos="br" title="Bottom right"></button>
      </div>
    </div>

    <div class="panel-section">
      <p class="panel-heading">Preview</p>
      <!-- internal 480×800, CSS maintains 3:5 ratio -->
      <canvas id="previewCanvas" width="480" height="800"></canvas>
    </div>

  </div>

</div>

<footer>
  Place on SD card as <code>/sleep.pxc</code> or inside <code>/.sleep/</code>
</footer>

<canvas id="workCanvas" width="480" height="800" style="display:none"></canvas>

<script>
const TARGET_W = 480;
const TARGET_H = 800;
const MAX_EDITOR_W = 340;
const MAX_EDITOR_H = 520;
const SNAP_THRESHOLD = 9;

// Pre-computed sRGB → linear LUT (avoids Math.pow per pixel)
const SRGB_TO_LINEAR = new Float32Array(256);
for (let i = 0; i < 256; i++) {
  const s = i / 255;
  SRGB_TO_LINEAR[i] = (s <= 0.04045 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4)) * 255;
}

// Gray reference values in LINEAR light — these are the linear equivalents of
// sRGB [0, 85, 170, 255], i.e. what the display outputs in linear reflectance.
// Error diffusion must run in linear space so errors are perceptually uniform.
const GRAY_REF  = [0, 23, 103, 255];

// Preview display values — sRGB encoded, for the monitor
const GRAY_DISP = [0, 85, 170, 255];

let loadedImg    = null;
let pxcBytes     = null;
let outputName   = 'sleep.pxc';
let mode         = 'crop';
let fitAlign     = 'mc';

let displayScale = 1;
let workScale    = 1;
let dispImgW = 0, dispImgH = 0;
let boxW = 0, boxH = 0, boxX = 0, boxY = 0;

let isDragging = false;
let dragStartX = 0, dragStartY = 0, dragStartBX = 0, dragStartBY = 0;
let snapH = false, snapV = false;
let convertTimer = null;

const dropZone      = document.getElementById('dropZone');
const fileInput     = document.getElementById('fileInput');
const editorSection = document.getElementById('editorSection');
const sourceFrame   = document.getElementById('sourceFrame');
const sourceCanvas  = document.getElementById('sourceCanvas');
const sourceLabel   = document.getElementById('sourceLabel');
const changeBtn     = document.getElementById('changeBtn');
const cropBox       = document.getElementById('cropBox');
const snapGuideH    = document.getElementById('snapGuideH');
const snapGuideV    = document.getElementById('snapGuideV');
const posSection    = document.getElementById('posSection');
const previewCanvas = document.getElementById('previewCanvas');
const workCanvas    = document.getElementById('workCanvas');
const downloadBtn   = document.getElementById('downloadBtn');

// Change / unload image
changeBtn.addEventListener('click', unloadImage);

function unloadImage() {
  clearTimeout(convertTimer);

  // Release decoded bitmap from browser memory
  if (loadedImg) { loadedImg.src = ''; loadedImg = null; }

  // Release dithered output buffer
  pxcBytes = null;

  // Free canvas pixel buffers by resizing to 1×1
  sourceCanvas.width = 1; sourceCanvas.height = 1;
  workCanvas.getContext('2d').clearRect(0, 0, TARGET_W, TARGET_H);
  previewCanvas.getContext('2d').clearRect(0, 0, TARGET_W, TARGET_H);

  // Reset file input so the same file can be re-picked
  fileInput.value = '';

  // Reset state
  outputName = 'sleep.pxc';
  clearSnap();

  // Restore UI
  dropZone.style.display = '';
  editorSection.classList.remove('visible');
  posSection.classList.remove('visible');
  downloadBtn.classList.remove('visible');
}

// Mode pills
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (loadedImg) resetEditor();
  });
});

// Position picker
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    fitAlign = btn.dataset.pos;
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    scheduleConvert(0);
  });
});

// Drop / browse
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  outputName = file.name.replace(/\.[^.]+$/, '') + '.pxc';
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { loadedImg = img; resetEditor(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetEditor() {
  const srcW = loadedImg.naturalWidth;
  const srcH = loadedImg.naturalHeight;

  displayScale = Math.min(MAX_EDITOR_W / srcW, MAX_EDITOR_H / srcH);
  dispImgW = Math.round(srcW * displayScale);
  dispImgH = Math.round(srcH * displayScale);

  workScale = mode === 'crop'
    ? Math.max(TARGET_W / srcW, TARGET_H / srcH)
    : Math.min(TARGET_W / srcW, TARGET_H / srcH);

  boxW = Math.min((TARGET_W / workScale) * displayScale, dispImgW);
  boxH = Math.min((TARGET_H / workScale) * displayScale, dispImgH);
  boxX = (dispImgW - boxW) / 2;
  boxY = (dispImgH - boxH) / 2;

  sourceCanvas.width  = dispImgW;
  sourceCanvas.height = dispImgH;
  sourceCanvas.getContext('2d').drawImage(loadedImg, 0, 0, dispImgW, dispImgH);
  sourceFrame.style.width  = dispImgW + 'px';
  sourceFrame.style.height = dispImgH + 'px';

  if (mode === 'crop') {
    sourceLabel.textContent = 'Source — drag to reposition';
    cropBox.style.display = 'block';
    posSection.classList.remove('visible');
    clearSnap();
    applyCropBox();
  } else {
    sourceLabel.textContent = 'Source';
    cropBox.style.display = 'none';
    posSection.classList.add('visible');
    clearSnap();
  }

  dropZone.style.display = 'none';
  editorSection.classList.add('visible');
  scheduleConvert(0);
}

function applyCropBox() {
  boxX = Math.max(0, Math.min(dispImgW - boxW, boxX));
  boxY = Math.max(0, Math.min(dispImgH - boxH, boxY));
  cropBox.style.left   = boxX + 'px';
  cropBox.style.top    = boxY + 'px';
  cropBox.style.width  = boxW + 'px';
  cropBox.style.height = boxH + 'px';
}

function clearSnap() {
  snapH = snapV = false;
  snapGuideH.classList.remove('active');
  snapGuideV.classList.remove('active');
  cropBox.classList.remove('snapped');
}

// Drag
cropBox.addEventListener('mousedown',  onDragStart);
cropBox.addEventListener('touchstart', onDragStart, { passive: false });
window.addEventListener('mousemove',   onDragMove);
window.addEventListener('touchmove',   onDragMove, { passive: false });
window.addEventListener('mouseup',     onDragEnd);
window.addEventListener('touchend',    onDragEnd);

function clientXY(e) {
  return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                   : { x: e.clientX, y: e.clientY };
}

function onDragStart(e) {
  if (mode !== 'crop') return;
  e.preventDefault();
  isDragging = true;
  const p = clientXY(e);
  dragStartX = p.x; dragStartY = p.y;
  dragStartBX = boxX; dragStartBY = boxY;
}

function onDragMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const p = clientXY(e);
  let rawX = dragStartBX + (p.x - dragStartX);
  let rawY = dragStartBY + (p.y - dragStartY);
  const cx = (dispImgW - boxW) / 2, cy = (dispImgH - boxH) / 2;
  snapH = Math.abs(rawX - cx) < SNAP_THRESHOLD;
  snapV = Math.abs(rawY - cy) < SNAP_THRESHOLD;
  boxX = snapH ? cx : rawX;
  boxY = snapV ? cy : rawY;
  applyCropBox();
  snapGuideV.classList.toggle('active', snapH);
  snapGuideH.classList.toggle('active', snapV);
  cropBox.classList.toggle('snapped', snapH || snapV);
  scheduleConvert(100);
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  setTimeout(clearSnap, 600);
  scheduleConvert(0);
}

// Conversion
function scheduleConvert(delay) {
  clearTimeout(convertTimer);
  convertTimer = setTimeout(convert, delay);
}

// BT.601 luminance in LINEAR light — weights applied after sRGB linearisation
function lum(r, g, b) {
  return 0.299 * SRGB_TO_LINEAR[r] + 0.587 * SRGB_TO_LINEAR[g] + 0.114 * SRGB_TO_LINEAR[b];
}

// Thresholds are midpoints of GRAY_REF linear values [0, 23, 103, 255]
function quantize(v) {
  if (v < 12)  return 0;
  if (v < 63)  return 1;
  if (v < 179) return 2;
  return 3;
}

function fitOffset(fw, fh) {
  const pos = fitAlign;
  const x = pos[1] === 'l' ? 0 : pos[1] === 'c' ? (TARGET_W - fw) / 2 : TARGET_W - fw;
  const y = pos[0] === 't' ? 0 : pos[0] === 'm' ? (TARGET_H - fh) / 2 : TARGET_H - fh;
  return { x, y };
}

function convert() {
  if (!loadedImg) return;
  const srcW = loadedImg.naturalWidth;
  const srcH = loadedImg.naturalHeight;
  const ctx  = workCanvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, TARGET_W, TARGET_H);

  if (mode === 'fit') {
    const fs = Math.min(TARGET_W / srcW, TARGET_H / srcH);
    const fw = srcW * fs, fh = srcH * fs;
    const off = fitOffset(fw, fh);
    ctx.drawImage(loadedImg, off.x, off.y, fw, fh);
  } else {
    const k = workScale / displayScale;
    ctx.drawImage(loadedImg, -boxX * k, -boxY * k, srcW * workScale, srcH * workScale);
  }

  const px  = ctx.getImageData(0, 0, TARGET_W, TARGET_H).data;
  const buf = new Float32Array(TARGET_W * TARGET_H);
  for (let i = 0; i < TARGET_W * TARGET_H; i++)
    buf[i] = lum(px[i*4], px[i*4+1], px[i*4+2]);  // linear luminance 0–255

  const q = new Uint8Array(TARGET_W * TARGET_H);
  for (let y = 0; y < TARGET_H; y++) {
    for (let x = 0; x < TARGET_W; x++) {
      const i  = y * TARGET_W + x;
      const v  = Math.max(0, Math.min(255, buf[i]));
      const qv = quantize(v);
      q[i]     = qv;
      const err = v - GRAY_REF[qv];
      if (x + 1 < TARGET_W) buf[i+1] += err * 7/16;
      if (y + 1 < TARGET_H) {
        if (x > 0) buf[i+TARGET_W-1] += err * 3/16;
        buf[i+TARGET_W]   += err * 5/16;
        if (x + 1 < TARGET_W) buf[i+TARGET_W+1] += err * 1/16;
      }
    }
  }

  const pc  = previewCanvas.getContext('2d');
  const id  = pc.createImageData(TARGET_W, TARGET_H);
  for (let i = 0; i < TARGET_W * TARGET_H; i++) {
    const g = GRAY_DISP[q[i]];
    id.data[i*4] = id.data[i*4+1] = id.data[i*4+2] = g;
    id.data[i*4+3] = 255;
  }
  pc.putImageData(id, 0, 0);

  pxcBytes = encodePxc(q, TARGET_W, TARGET_H);
  downloadBtn.classList.add('visible');
}

function encodePxc(q, w, h) {
  const bpr = Math.ceil(w / 4);
  const buf = new Uint8Array(4 + bpr * h);
  buf[0] = w & 0xFF; buf[1] = (w >> 8) & 0xFF;
  buf[2] = h & 0xFF; buf[3] = (h >> 8) & 0xFF;
  for (let row = 0; row < h; row++)
    for (let col = 0; col < w; col++) {
      const pv = q[row * w + col] & 0x03;
      buf[4 + row * bpr + (col >> 2)] |= pv << (6 - (col & 3) * 2);
    }
  return buf;
}

downloadBtn.addEventListener('click', () => {
  if (!pxcBytes) return;
  const url = URL.createObjectURL(new Blob([pxcBytes], { type: 'application/octet-stream' }));
  const a = document.createElement('a');
  a.href = url; a.download = outputName; a.click();
  URL.revokeObjectURL(url);
});
</script>
